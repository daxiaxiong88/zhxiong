name: Scan Images

on:
  push:
    paths:
      - 'gallery/**'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate images.json
        run: python scan_images.py

      - name: Commit images.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery/images.json
          git diff --staged --quiet || git commit -m "Auto-update images.json [skip ci]"
          git push
